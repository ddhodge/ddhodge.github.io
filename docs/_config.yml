title: My Docs Site
description: Playing with Jekyll + Just the Docs theme on GitHub Pages

remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme

# Recommended basics (add more later)
color_scheme: light               # or "dark"
search_enabled: true              # built-in search bar
aux_links:                        # top-right links (optional)
  GitHub Repo:
    - "//github.com/yourusername/your-repo"
    - "//github.com/yourusername/your-repo/blob/main/README.md"  # example extra
